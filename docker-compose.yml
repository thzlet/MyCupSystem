version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: diario_copa_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: db_diariocopa
      MYSQL_USER: user_copa
      MYSQL_PASSWORD: senha_copa_123
    ports:
      - "11000:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: